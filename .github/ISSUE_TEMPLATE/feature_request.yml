name: 機能要望 / Feature Request
description: 新機能・改善を提案する
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題 / Problem
      description: どんな問題・不便を解決したいか
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案 / Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案 / Alternatives considered

  - type: dropdown
    id: area
    attributes:
      label: 対象範囲 / Affected area
      multiple: true
      options:
        - frontend (Next.js)
        - backend (Elysia/Bun)
        - desktop (Tauri)
        - database (Prisma)
        - CI/CD
        - その他 / other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 補足 / Additional context
