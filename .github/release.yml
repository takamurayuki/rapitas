# Configuration for GitHub's auto-generated release notes.
# Used by softprops/action-gh-release in tauri-build.yml when
# generate_release_notes: true is set.
#
# Docs: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - stale
    authors:
      - dependabot
      - dependabot[bot]
  categories:
    - title: 🚨 Breaking Changes
      labels:
        - breaking-change
    - title: ✨ New Features
      labels:
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: 🔒 Security
      labels:
        - security
    - title: ⚡ Performance
      labels:
        - performance
    - title: ♻️ Refactoring
      labels:
        - refactor
    - title: 📚 Documentation
      labels:
        - docs
        - 'area: docs'
    - title: 🧪 Tests
      labels:
        - test
    - title: 🏗️ CI / Build
      labels:
        - 'area: ci'
        - chore
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - '*'
