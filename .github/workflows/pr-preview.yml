name: PR Preview Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'rapitas-frontend/**'
      - 'rapitas-backend/**'
      - 'rapitas-desktop/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'bun.lockb'

env:
  BUN_LOCKFILE_SKIP: true  # Skip lockfile validation in CI
  NEXT_TURBO: 0  # Disable Turbopack globally in CI

jobs:
  preview-info:
    name: Post Preview Info
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🚀 Preview Build')
            );

            const body = `🚀 **Preview Build**

            The CI/CD pipeline is building preview versions of Rapitas for this pull request.

            | Platform | Status |
            | --- | --- |
            | Windows | 🔄 Building... |
            | macOS | 🔄 Building... |
            | Linux | 🔄 Building... |

            Preview builds will be available as artifacts once the build completes.

            ---
            💡 *This comment will be updated as the build progresses.*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

  quick-build:
    name: Quick Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Install desktop dependencies
        working-directory: rapitas-desktop
        run: pnpm install --no-frozen-lockfile

      - name: Build backend
        working-directory: rapitas-backend
        run: |
          bun build index.ts --compile --outfile rapitas-backend
          mkdir -p ../rapitas-desktop/src-tauri/binaries
          cp rapitas-backend ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu
          chmod +x ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu

      - name: Build frontend
        working-directory: rapitas-frontend
        run: pnpm run build:tauri
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_TURBO: 0

      - name: Quick Rust check
        working-directory: rapitas-desktop/src-tauri
        run: cargo check

      - name: Update PR comment on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🚀 Preview Build')
            );

            if (botComment) {
              const body = botComment.body.replace(
                '| Linux | 🔄 Building... |',
                '| Linux | ✅ Build check passed |'
              );

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body
              });
            }