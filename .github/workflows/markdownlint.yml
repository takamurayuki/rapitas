name: Markdownlint

on:
  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.markdownlintignore'
      - '.github/workflows/markdownlint.yml'
  workflow_dispatch:

jobs:
  markdownlint:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    # Advisory until the existing Markdown is brought up to spec.
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md"
