name: Update Lockfiles

on:
  workflow_dispatch:
  push:
    paths:
      - 'rapitas-frontend/package.json'
      - 'rapitas-backend/package.json'
      - 'rapitas-desktop/package.json'
    branches:
      - develop
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfiles:
    name: Update Lockfiles
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.11'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Update Bun lockfile
        working-directory: rapitas-backend
        run: |
          rm -f bun.lock
          bun install
          echo "BACKEND_UPDATED=$(git diff --quiet bun.lock || echo 'true')" >> $GITHUB_ENV

      - name: Update Frontend pnpm lockfile
        working-directory: rapitas-frontend
        run: |
          pnpm install
          echo "FRONTEND_UPDATED=$(git diff --quiet pnpm-lock.yaml || echo 'true')" >> $GITHUB_ENV

      - name: Update Desktop pnpm lockfile
        working-directory: rapitas-desktop
        run: |
          pnpm install
          echo "DESKTOP_UPDATED=$(git diff --quiet pnpm-lock.yaml || echo 'true')" >> $GITHUB_ENV

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix: update lockfiles for dependency changes'
          title: 'fix: Update lockfiles for dependency changes'
          body: |
            ## 🔄 Lockfile Updates

            This PR automatically updates the lockfiles to match the current package.json files.

            ### Changes:
            - Backend (bun.lock): ${{ env.BACKEND_UPDATED == 'true' && '✅ Updated' || '➖ No changes' }}
            - Frontend (pnpm-lock.yaml): ${{ env.FRONTEND_UPDATED == 'true' && '✅ Updated' || '➖ No changes' }}
            - Desktop (pnpm-lock.yaml): ${{ env.DESKTOP_UPDATED == 'true' && '✅ Updated' || '➖ No changes' }}

            ### Why this PR was created:
            - Package dependencies were modified but lockfiles were not updated
            - This ensures CI/CD builds work correctly with frozen lockfiles

            ---
            🤖 *This PR was automatically generated by the lockfile update workflow*
          branch: update-lockfiles
          delete-branch: true
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}

      - name: Comment on success
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "✅ All lockfiles are already up to date!"