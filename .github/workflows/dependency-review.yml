name: Dependency Review

on:
  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '**/pnpm-lock.yaml'
      - '**/bun.lock'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/dependency-review.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce new vulnerabilities at HIGH or CRITICAL.
          fail-on-severity: high
          # Surface license changes in the PR comment.
          comment-summary-in-pr: on-failure
          # Disallow these license categories outright.
          deny-licenses: 'AGPL-1.0, AGPL-1.0-only, AGPL-1.0-or-later, AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later, GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0'
          warn-only: false
