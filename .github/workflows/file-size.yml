name: File Size Check

on:
  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - 'rapitas-backend/**/*.ts'
      - 'rapitas-frontend/src/**/*.{ts,tsx}'
      - 'rapitas-desktop/src-tauri/src/**/*.rs'
      - 'scripts/check-large-files.cjs'
      - '.github/workflows/file-size.yml'
  workflow_dispatch:

jobs:
  file-size:
    name: Enforce per-file line limits (with ratchet baseline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Hard fail if any NEW file exceeds 500 lines, OR if any file already in
      # .baselines/file-size.json grew beyond its snapshot. Existing baseline
      # files are exempt at their current size — split them to remove the
      # entry.
      - name: Run file-size check (ratchet)
        run: node scripts/check-large-files.cjs
