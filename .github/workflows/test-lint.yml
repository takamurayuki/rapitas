name: Test and Lint

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop

env:
  BUN_LOCKFILE_SKIP: true  # Skip lockfile validation in CI

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    # Advisory: pre-existing test failures. Hard-gate once all tests pass.
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: rapitas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.11'

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Setup test database
        working-directory: rapitas-backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/rapitas_test
        run: |
          bunx prisma db push --skip-generate
          bunx prisma generate

      - name: Run backend tests with coverage
        working-directory: rapitas-backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/rapitas_test
        run: bun test --coverage

      # ADR-0002 Phase A: print-only backend coverage (no gate yet).
      # Phase B will add a hard threshold once the baseline is observed.
      - name: Print backend coverage summary
        working-directory: rapitas-backend
        run: echo "Backend coverage printed above. Phase B will gate at observed value."

  check-frontend:
    name: Check Frontend
    runs-on: ubuntu-latest
    # Advisory: pre-existing test failures + coverage gate still at 15%.
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Setup Bun for frontend tests
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.11'

      - name: Install frontend dependencies (bun)
        working-directory: rapitas-frontend
        run: bun install

      - name: Run TypeScript type check
        working-directory: rapitas-frontend
        run: pnpm tsc --noEmit

      - name: Run frontend tests with coverage
        working-directory: rapitas-frontend
        run: bunx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Check coverage thresholds
        working-directory: rapitas-frontend
        run: |
          node -e "
            const report = require('./coverage/coverage-summary.json');
            const total = report.total;
            const lines = total.lines.pct;
            const branches = total.branches.pct;
            const functions = total.functions.pct;
            console.log('Coverage: lines=' + lines + '% branches=' + branches + '% functions=' + functions + '%');
            // TODO: raise stepwise — 15 → 30 → 50 → 80 (CLAUDE.md target).
            const THRESHOLD = 15;
            if (lines < THRESHOLD) { console.error('Line coverage ' + lines + '% is below threshold ' + THRESHOLD + '%'); process.exit(1); }
          "

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.11'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Generate Prisma Client (needed for tsc)
        working-directory: rapitas-backend
        run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Check backend TypeScript
        working-directory: rapitas-backend
        run: bunx tsc --noEmit

      - name: Check backend formatting
        working-directory: rapitas-backend
        run: bunx prettier --check "**/*.ts" --ignore-path .gitignore

      - name: Lint frontend code (advisory — pre-existing errors)
        working-directory: rapitas-frontend
        continue-on-error: true
        run: pnpm lint

      - name: Check frontend formatting
        working-directory: rapitas-frontend
        run: pnpm prettier --check "src/**/*.{ts,tsx,js,jsx,css,md}"

  rust-check:
    name: Check Rust Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './rapitas-desktop/src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf

      - name: Check Rust formatting
        working-directory: rapitas-desktop/src-tauri
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: rapitas-desktop/src-tauri
        # NOTE: build.rs calls tauri_build::build() which fails without the
        # backend sidecar binary. Set CI=true so build.rs creates a placeholder,
        # then allow the build script warning. Advisory until build.rs is
        # refactored to handle CI gracefully.
        continue-on-error: true
        run: cargo clippy -- -D warnings