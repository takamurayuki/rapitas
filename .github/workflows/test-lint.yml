name: Test and Lint

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop

env:
  BUN_LOCKFILE_SKIP: true  # Skip lockfile validation in CI
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: rapitas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Setup test database
        working-directory: rapitas-backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/rapitas_test
        run: |
          bunx prisma db push --skip-generate
          bunx prisma generate

      - name: Run backend tests with coverage
        working-directory: rapitas-backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/rapitas_test
        run: >
          bun test --coverage
          tests/debug-log-analyzer.test.ts
          tests/debug-log-parsers.test.ts
          tests/event-emitter.test.ts
          tests/metrics-collector.test.ts
          tests/registry.test.ts
          services/ai/weekly-review-service.test.ts
          services/task/task-dependency-service.test.ts
          tests/integration/claude-code-agent.integration.test.ts
          tests/middleware/error-handler.test.ts

      - name: Print backend coverage summary
        working-directory: rapitas-backend
        run: echo "Backend gate suite coverage printed above."

  check-frontend:
    name: Check Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Setup pnpm cache
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Setup Bun for frontend tests
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install frontend dependencies (bun)
        working-directory: rapitas-frontend
        run: bun install

      - name: Run TypeScript type check
        working-directory: rapitas-frontend
        run: pnpm tsc --noEmit

      - name: Run frontend gate tests
        working-directory: rapitas-frontend
        run: >
          bunx vitest run
          src/components/__tests__/AppIcon.test.tsx
          src/components/__tests__/ErrorBoundary.test.tsx
          src/components/__tests__/LanguageSwitcher.test.tsx
          src/components/copilot/__tests__/CopilotChatPanel.test.tsx
          src/app/ideas/_components/__tests__/IdeaBoxHeader.test.tsx
          src/app/ideas/_components/__tests__/IdeasClient.test.tsx
          src/hooks/__tests__/useBackendHealth.test.ts
          src/hooks/__tests__/useDarkMode.test.ts
          src/hooks/__tests__/useDebounce.test.ts
          src/hooks/__tests__/useFilteredTasks.test.ts
          src/hooks/__tests__/useLocalStorageState.test.ts
          src/hooks/__tests__/useLoginForm.test.ts
          src/hooks/__tests__/useNotificationPreferences.test.ts
          src/hooks/__tests__/usePomodoroStats.test.ts
          src/hooks/__tests__/useSearchFilters.test.ts
          src/hooks/__tests__/useSplitView.test.ts
          src/hooks/__tests__/useTaskSearch.test.ts
          src/hooks/__tests__/useTaskSorting.test.ts
          src/hooks/__tests__/useWindowResize.test.ts
          src/hooks/__tests__/useWorkflowFiles.test.ts
          src/lib/__tests__/cache-utils.test.ts
          src/lib/__tests__/cache-warmup.test.ts
          src/lib/__tests__/logger.test.ts
          src/lib/__tests__/task-api.test.ts
          src/lib/__tests__/utils.test.ts
          src/lib/audio/__tests__/wav-codec.test.ts
          src/stores/__tests__/app-mode-store.test.ts
          src/stores/__tests__/execution-state-store.test.ts
          src/stores/__tests__/filter-data-store.test.ts
          src/stores/__tests__/locale-store.test.ts
          src/stores/__tests__/note-store.test.ts
          src/stores/__tests__/shortcut-store.test.ts
          src/stores/__tests__/task-cache-store.test.ts
          src/stores/__tests__/task-detail-visibility-store.test.ts
          src/stores/__tests__/ui-mode-store.test.ts
          src/utils/__tests__/api.test.ts
          src/utils/__tests__/date.test.ts
          src/utils/__tests__/external-links.test.ts
          src/utils/__tests__/favicon.test.ts
          src/utils/__tests__/holidays.test.ts
          src/utils/__tests__/labels.test.ts
          src/utils/__tests__/notification.test.ts
          src/utils/__tests__/tauri.test.ts
          src/utils/__tests__/validation.test.ts
          src/feature/knowledge/hooks/__tests__/useContradictions.test.ts
          src/feature/knowledge/hooks/__tests__/useKnowledgeSearch.test.ts
          src/feature/developer-mode/components/__tests__/formatLogLine.test.ts
          src/feature/tasks/components/gantt/gantt-utils.test.ts
          src/feature/tasks/hooks/__tests__/formatLogData.test.ts

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Generate Prisma Client (needed for tsc)
        working-directory: rapitas-backend
        run: bunx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Check backend TypeScript
        working-directory: rapitas-backend
        run: bunx tsc --noEmit

      - name: Check desktop SQLite Prisma generation
        working-directory: rapitas-backend
        run: bun run db:prepare:sqlite
        env:
          RAPITAS_DB_PROVIDER: sqlite
          DATABASE_URL: "file:./rapitas-ci.db"

      - name: Check backend TypeScript with SQLite Prisma Client
        working-directory: rapitas-backend
        run: bunx tsc --noEmit
        env:
          RAPITAS_DB_PROVIDER: sqlite
          DATABASE_URL: "file:./rapitas-ci.db"

      - name: Check backend formatting
        working-directory: rapitas-backend
        run: bunx prettier --check "**/*.ts" --ignore-path .gitignore

      - name: Lint frontend code
        working-directory: rapitas-frontend
        run: pnpm lint

      - name: Check frontend formatting
        working-directory: rapitas-frontend
        run: pnpm prettier --check "src/**/*.{ts,tsx,js,jsx,css,md}"

  rust-check:
    name: Check Rust Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './rapitas-desktop/src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf

      - name: Check Rust formatting
        working-directory: rapitas-desktop/src-tauri
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: rapitas-desktop/src-tauri
        env:
          CI: true
        run: cargo clippy -- -D warnings
