name: Test and Lint

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop

env:
  BUN_LOCKFILE_SKIP: true  # Skip lockfile validation in CI

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: rapitas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.42'

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Setup test database
        working-directory: rapitas-backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/rapitas_test
        run: |
          bunx prisma db push --skip-generate
          bunx prisma generate

      - name: Run backend tests
        working-directory: rapitas-backend
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/rapitas_test
        run: bun test

  check-frontend:
    name: Check Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Run TypeScript type check
        working-directory: rapitas-frontend
        run: pnpm tsc --noEmit

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.42'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Check backend TypeScript
        working-directory: rapitas-backend
        run: bunx tsc --noEmit

      - name: Lint frontend code
        working-directory: rapitas-frontend
        run: pnpm lint

      - name: Check frontend formatting
        working-directory: rapitas-frontend
        run: pnpm prettier --check "src/**/*.{ts,tsx,js,jsx,css,md}"

  rust-check:
    name: Check Rust Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './rapitas-desktop/src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Check Rust formatting
        working-directory: rapitas-desktop/src-tauri
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: rapitas-desktop/src-tauri
        run: cargo clippy -- -D warnings