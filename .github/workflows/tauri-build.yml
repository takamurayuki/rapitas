name: Build Tauri App

on:
  push:
    branches:
      - master
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:

env:
  RUST_BACKTRACE: full
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  BUN_LOCKFILE_SKIP: true  # Skip lockfile validation in CI
  NEXT_TURBO: 0  # Disable Turbopack globally in CI

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
            rust_version: stable
            bunjs_version: '1.1.42'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            rust_version: stable
            bunjs_version: '1.1.42'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            rust_version: stable
            bunjs_version: '1.1.42'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            rust_version: stable
            bunjs_version: '1.1.42'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bunjs_version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_version }}
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './rapitas-desktop/src-tauri -> target'

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-v2-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-v2-

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Install desktop dependencies
        working-directory: rapitas-desktop
        run: pnpm install --no-frozen-lockfile

      - name: Build backend binary (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: rapitas-backend
        run: |
          bun build index.ts --compile --outfile rapitas-backend.exe
          mkdir -p ../rapitas-desktop/src-tauri/binaries
          cp rapitas-backend.exe ../rapitas-desktop/src-tauri/binaries/rapitas-backend-${{ matrix.target }}.exe

      - name: Build backend binary (Unix)
        if: matrix.platform != 'windows-latest'
        working-directory: rapitas-backend
        run: |
          bun build index.ts --compile --outfile rapitas-backend
          mkdir -p ../rapitas-desktop/src-tauri/binaries
          cp rapitas-backend ../rapitas-desktop/src-tauri/binaries/rapitas-backend-${{ matrix.target }}
          chmod +x ../rapitas-desktop/src-tauri/binaries/rapitas-backend-${{ matrix.target }}

      - name: Build frontend
        working-directory: rapitas-frontend
        run: pnpm run build:tauri
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Disable Turbopack for CI builds to avoid import resolution issues
          NEXT_TURBO: 0

      - name: Build Tauri application
        working-directory: rapitas-desktop
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rapitas-windows-${{ matrix.target }}
          path: |
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rapitas-macos-${{ matrix.target }}
          path: |
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rapitas-linux-${{ matrix.target }}
          path: |
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}