name: Build Tauri App

on:
  push:
    branches:
      - master
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
      - develop
  workflow_dispatch:

env:
  RUST_BACKTRACE: full
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  BUN_LOCKFILE_SKIP: true  # Skip lockfile validation in CI
  NEXT_TURBO: 0  # Disable Turbopack globally in CI

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
            rust_version: stable
            bunjs_version: '1.3.11'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            rust_version: stable
            bunjs_version: '1.3.11'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            rust_version: stable
            bunjs_version: '1.3.11'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            rust_version: stable
            bunjs_version: '1.3.11'

    runs-on: ${{ matrix.platform }}


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ matrix.bunjs_version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_version }}
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './rapitas-desktop/src-tauri -> target'

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libfuse2 \
            file \
            desktop-file-utils \
            wget \
            curl \
            ca-certificates \
            zsync \
            squashfs-tools \
            libc6-dev \
            libgcc-s1

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Get pnpm store directory
        id: pnpm_cache_dir
        shell: bash
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_cache_dir.outputs.dir }}
          key: ${{ runner.os }}-pnpm-store-v2-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-v2-

      - name: Install backend dependencies
        working-directory: rapitas-backend
        run: bun install

      - name: Install frontend dependencies
        working-directory: rapitas-frontend
        run: pnpm install --no-frozen-lockfile

      - name: Install desktop dependencies
        working-directory: rapitas-desktop
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        working-directory: rapitas-backend
        run: |
          echo "Generating Prisma Client..."
          bun run prisma generate
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/rapitas?schema=public"

      - name: Build backend binary (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: rapitas-backend
        run: |
          echo "Building full backend with Bun standalone compilation..."
          bun --version

          # Build full backend using index.ts
          bun build index.ts --compile --target bun-windows-x64 --outfile rapitas-backend.exe

          # Verify the build
          echo "Backend build complete. File details:"
          dir rapitas-backend.exe
          echo "Testing file existence..."
          if (Test-Path rapitas-backend.exe) { echo "✓ Backend binary exists" } else { echo "✗ Backend binary not found!" }

          # Create binaries directory and copy
          New-Item -ItemType Directory -Force -Path ../rapitas-desktop/src-tauri/binaries

          # Copy with platform-specific naming for Tauri sidecar
          if ("${{ matrix.target }}" -eq "x86_64-pc-windows-msvc") {
            # Windows: Copy WITHOUT .exe extension - Tauri will add it automatically during bundling
            # This prevents double .exe extension (rapitas-backend.exe.exe)
            Copy-Item rapitas-backend.exe ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-pc-windows-msvc.exe
            # IMPORTANT: Copy as generic name WITHOUT .exe extension (matches tauri.conf.json)
            Copy-Item rapitas-backend.exe ../rapitas-desktop/src-tauri/binaries/rapitas-backend
          }

          echo "Backend binary copied to Tauri binaries directory"
          dir ../rapitas-desktop/src-tauri/binaries/

      - name: Build backend binary (Unix)
        if: matrix.platform != 'windows-latest'
        working-directory: rapitas-backend
        run: |
          echo "Building full backend with Bun standalone compilation..."
          bun --version

          # Build full backend using index.ts
          if [ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]; then
            bun build index.ts --compile --target bun-linux-x64 --outfile rapitas-backend
          elif [ "${{ matrix.target }}" == "x86_64-apple-darwin" ]; then
            bun build index.ts --compile --target bun-darwin-x64 --outfile rapitas-backend
          elif [ "${{ matrix.target }}" == "aarch64-apple-darwin" ]; then
            bun build index.ts --compile --target bun-darwin-arm64 --outfile rapitas-backend
          else
            bun build index.ts --compile --outfile rapitas-backend
          fi

          # Verify the build
          echo "Backend build complete. File details:"
          ls -la rapitas-backend
          echo "File size: $(stat -c%s rapitas-backend 2>/dev/null || stat -f%z rapitas-backend) bytes"
          echo "File type: $(file rapitas-backend)"

          # Test if the binary runs
          echo "Testing backend binary..."
          # Don't test execution in CI - just verify file exists and is executable
          if [ -x ./rapitas-backend ]; then
            echo "✓ Backend binary is executable"
          else
            echo "✗ Backend binary is not executable"
            chmod +x ./rapitas-backend
            echo "Made backend binary executable"
          fi
          echo "Binary test completed"

          # Create binaries directory and copy
          mkdir -p ../rapitas-desktop/src-tauri/binaries

          # Copy with platform-specific naming for Tauri sidecar
          if [ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]; then
            cp rapitas-backend ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu
            # IMPORTANT: Also copy as generic name that matches tauri.conf.json
            cp rapitas-backend ../rapitas-desktop/src-tauri/binaries/rapitas-backend
            # Verify copy was successful
            echo "Verifying Linux binary copy:"
            ls -la ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu
            ls -la ../rapitas-desktop/src-tauri/binaries/rapitas-backend
          elif [ "${{ matrix.target }}" == "x86_64-apple-darwin" ]; then
            cp rapitas-backend ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-apple-darwin
            # Also copy as generic name
            cp rapitas-backend ../rapitas-desktop/src-tauri/binaries/rapitas-backend
            echo "Verifying macOS x64 binary copy:"
            ls -la ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-apple-darwin
            ls -la ../rapitas-desktop/src-tauri/binaries/rapitas-backend
          elif [ "${{ matrix.target }}" == "aarch64-apple-darwin" ]; then
            cp rapitas-backend ../rapitas-desktop/src-tauri/binaries/rapitas-backend-aarch64-apple-darwin
            # Also copy as generic name
            cp rapitas-backend ../rapitas-desktop/src-tauri/binaries/rapitas-backend
            echo "Verifying macOS ARM64 binary copy:"
            ls -la ../rapitas-desktop/src-tauri/binaries/rapitas-backend-aarch64-apple-darwin
            ls -la ../rapitas-desktop/src-tauri/binaries/rapitas-backend
          fi

          chmod +x ../rapitas-desktop/src-tauri/binaries/rapitas-backend*

          echo "Backend binary copied to Tauri binaries directory"
          ls -la ../rapitas-desktop/src-tauri/binaries/

          # Extra verification for Linux
          if [ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]; then
            echo ""
            echo "Verifying Linux binary setup:"
            echo "Expected binary: rapitas-backend-x86_64-unknown-linux-gnu"
            if [ -f "../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu" ]; then
              echo "✓ Binary exists at expected path"
              echo "Size: $(stat -c%s ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu) bytes"
              echo "Permissions: $(ls -la ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu)"

              # Test that the binary is executable
              if [ -x "../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu" ]; then
                echo "✓ Binary is executable"
              else
                echo "✗ Binary is NOT executable - fixing permissions"
                chmod +x ../rapitas-desktop/src-tauri/binaries/rapitas-backend-x86_64-unknown-linux-gnu
              fi
            else
              echo "✗ Binary NOT found at expected path!"
              echo "Contents of binaries directory:"
              ls -la ../rapitas-desktop/src-tauri/binaries/ || echo "Directory not found"

              # Try to fix by looking for alternative names
              echo ""
              echo "Attempting to fix by finding alternative binary names..."
              if [ -f "../rapitas-desktop/src-tauri/binaries/rapitas-backend" ]; then
                echo "Found 'rapitas-backend' - this should already be in place"
                echo "✓ Generic binary exists"
              fi
            fi
          fi

      - name: Build frontend
        working-directory: rapitas-frontend
        run: |
          echo "Building frontend with TAURI_BUILD=$TAURI_BUILD"
          echo "Current environment variables:"
          echo "NEXT_TURBO=$NEXT_TURBO"
          echo "TAURI_BUILD=$TAURI_BUILD"

          # Run Next.js build directly
          pnpm run build:tauri:ci

          # Run restore script
          node scripts/prepare-tauri-build.js restore

          # Check build output
          echo ""
          echo "Checking build output..."
          if [ -d "out" ]; then
            echo "✓ out directory exists with $(ls -1 out | wc -l) files"
            count=0
            for entry in out/* out/.[!.]* out/..?*; do
              [ -e "$entry" ] || continue
              echo "$entry"
              count=$((count + 1))
              [ "$count" -ge 10 ] && break
            done
          else
            echo "✗ out directory not found!"
            echo ""
            echo "Current directory contents:"
            ls -la
            echo ""
            echo "Checking .next directory:"
            if [ -d ".next" ]; then
              count=0
              for entry in .next/* .next/.[!.]* .next/..?*; do
                [ -e "$entry" ] || continue
                echo "$entry"
                count=$((count + 1))
                [ "$count" -ge 10 ] && break
              done
            fi
          fi
        shell: bash
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Disable Turbopack for CI builds to avoid import resolution issues
          NEXT_TURBO: 0
          # Enable Tauri build mode for static export
          TAURI_BUILD: 'true'

      - name: Prepare desktop build (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: rapitas-desktop
        run: |
          pnpm run ci:prepare

          # Verify backend binary exists after build
          echo "Checking backend binary in binaries directory..."
          if (Test-Path "src-tauri/binaries") {
            Get-ChildItem "src-tauri/binaries" | Format-Table Name, Length
          } else {
            echo "binaries directory not found"
          }

      - name: Prepare desktop build (Unix)
        if: matrix.platform != 'windows-latest'
        working-directory: rapitas-desktop
        run: |
          pnpm run ci:prepare

          # Verify backend binary exists after build
          echo "Checking backend binary in binaries directory..."
          if [ -d "src-tauri/binaries" ]; then
            ls -la src-tauri/binaries/
          else
            echo "binaries directory not found"
          fi
        shell: bash

      - name: Verify backend binary before configuration (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: rapitas-desktop
        run: |
          echo "Checking binaries directory content before configuration:"
          if (Test-Path "src-tauri/binaries") {
            echo "Directory exists. Contents:"
            Get-ChildItem "src-tauri/binaries" | Format-Table Name, Length, LastWriteTime
            echo ""
            echo "Looking for expected binary: rapitas-backend-${{ matrix.target }}*"
            Get-ChildItem "src-tauri/binaries/rapitas-backend*" -ErrorAction SilentlyContinue | Format-Table Name, Length
            if ($LASTEXITCODE -ne 0) { echo "No rapitas-backend files found" }
          } else {
            echo "binaries directory does not exist!"
            echo "Creating binaries directory..."
            New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          }

      - name: Verify backend binary before configuration (Unix)
        if: matrix.platform != 'windows-latest'
        working-directory: rapitas-desktop
        run: |
          echo "Checking binaries directory content before configuration:"
          if [ -d "src-tauri/binaries" ]; then
            echo "Directory exists. Contents:"
            ls -la src-tauri/binaries/
            echo ""
            echo "Looking for expected binary: rapitas-backend-${{ matrix.target }}*"
            ls -la src-tauri/binaries/rapitas-backend* 2>/dev/null || echo "No rapitas-backend files found"
          else
            echo "binaries directory does not exist!"
            echo "Creating binaries directory..."
            mkdir -p src-tauri/binaries
          fi
        shell: bash

      - name: Prepare backend binary configuration
        working-directory: rapitas-desktop
        run: |
          # Run the script to prepare backend binary configuration
          node scripts/prepare-backend-binary.js ${{ matrix.target }}

          # Verify that the binary setup is correct
          echo ""
          echo "Final verification after prepare-backend-binary.js:"
          if [ -d "src-tauri/binaries" ]; then
            echo "Binaries directory contents:"
            ls -la src-tauri/binaries/
          else
            echo "ERROR: binaries directory does not exist!"
          fi

          # Check tauri.build.conf.json was updated
          echo ""
          echo "Checking tauri.build.conf.json externalBin configuration:"
          grep -A2 -B2 "externalBin" src-tauri/tauri.build.conf.json || echo "No externalBin found in config"
        shell: bash

      - name: Ensure binaries directory exists
        working-directory: rapitas-desktop
        shell: bash
        run: |
          # Ensure binaries directory exists before build
          if [ ! -d "src-tauri/binaries" ]; then
            mkdir -p src-tauri/binaries
            echo "Created binaries directory"
          else
            echo "Binaries directory already exists"
          fi

      # AppImage bundling disabled due to linuxdeploy compatibility issues in CI
      # Using deb and rpm packages instead for Linux distribution
      # - name: Prepare AppImage tools (Ubuntu)
      #   if: matrix.platform == 'ubuntu-latest'
      #   run: |
      #     echo "AppImage bundling is disabled - using deb/rpm instead"

      - name: Build Tauri application
        working-directory: rapitas-desktop
        run: |
          # Build Tauri application with the correct target
          echo "Building Tauri app for ${{ matrix.platform }} (${{ matrix.target }})"
          echo "Bundle targets: deb, rpm (AppImage disabled)"
          pnpm run build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
          DATABASE_URL: "postgresql://user:password@localhost:5432/rapitas?schema=public"  # Valid dummy URL for CI
          TARGET: ${{ matrix.target }}  # Pass target to build scripts

      - name: List build artifacts
        working-directory: rapitas-desktop
        run: |
          echo "Listing generated artifacts..."
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            # Use Windows cmd for dir command
            cmd /c "dir src-tauri\target\${{ matrix.target }}\release\bundle /s /b" || echo "No bundle files found"
          else
            find src-tauri/target/${{ matrix.target }}/release/bundle -type f -name "*" 2>/dev/null || echo "No bundle files found"
          fi
        shell: bash

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rapitas-windows-${{ matrix.target }}
          path: |
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rapitas-macos-${{ matrix.target }}
          path: |
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rapitas-linux-${{ matrix.target }}
          path: |
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            rapitas-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.deb
            artifacts/**/*.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
